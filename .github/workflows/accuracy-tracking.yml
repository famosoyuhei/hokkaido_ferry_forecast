name: Accuracy Tracking

on:
  schedule:
    # Run at 22:30 UTC (07:30 JST) — 30 min after weather collection
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  run-accuracy-tracking:
    runs-on: ubuntu-latest
    name: Run Hindcast Accuracy Tracking

    steps:
      - name: Run accuracy tracking (with retry)
        run: |
          echo "Running hindcast accuracy tracking..."
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" --max-time 120 \
              -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
              "https://web-production-a628.up.railway.app/admin/run-accuracy-only")
            http_code=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | head -n -1)
            echo "Attempt $i/$MAX_RETRIES - HTTP Status: $http_code"
            if [ "$http_code" = "200" ]; then
              echo "Accuracy tracking successful"
              echo "$body" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(f'  Status: {d.get(\"status\", \"?\")}')
    r = d.get('result', {})
    if r:
        print(f'  Accuracy: {r.get(\"accuracy_rate\", \"?\"):.1f}%')
        print(f'  Precision: {r.get(\"precision\", \"?\"):.3f}')
        print(f'  Recall: {r.get(\"recall\", \"?\"):.3f}')
        print(f'  F1: {r.get(\"f1_score\", \"?\"):.3f}')
        if r.get('is_likely_maintenance'):
            print('  *** Maintenance day flagged — P/R/F1 excluded from metrics ***')
except: pass
" 2>/dev/null || true
              exit 0
            fi
            echo "Failed (status $http_code). Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "Failed after $MAX_RETRIES attempts"
          exit 1
