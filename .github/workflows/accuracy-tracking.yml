name: Accuracy Tracking

on:
  schedule:
    # Run accuracy tracking daily at 22:00 UTC (07:00 JST)
    - cron: '0 22 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-accuracy-tracking:
    runs-on: ubuntu-latest
    name: Run Accuracy Tracking Scripts

    steps:
      - name: Trigger accuracy tracking (with retry)
        run: |
          echo "Triggering accuracy tracking scripts..."
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" --max-time 60 https://web-production-a628.up.railway.app/admin/run-accuracy-tracking)
            http_code=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | head -n -1)
            echo "Attempt $i/$MAX_RETRIES - HTTP Status: $http_code"
            if [ "$http_code" = "200" ]; then
              echo "Accuracy tracking successful"
              echo "$body"
              exit 0
            fi
            echo "Failed (status $http_code). Retrying in ${RETRY_DELAY}s..."
            echo "$body"
            sleep $RETRY_DELAY
          done
          echo "Accuracy tracking failed after $MAX_RETRIES attempts"
          exit 1
