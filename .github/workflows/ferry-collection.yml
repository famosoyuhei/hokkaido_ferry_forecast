name: Ferry Operations Collection

on:
  schedule:
    # Collect actual ferry operations data daily at 21:00 UTC (06:00 JST)
    - cron: '0 21 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  collect-ferry-data:
    runs-on: ubuntu-latest
    name: Collect Actual Ferry Operations

    steps:
      - name: Trigger ferry data collection (with retry)
        run: |
          echo "Triggering ferry operations data collection..."
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" --max-time 60 https://web-production-a628.up.railway.app/admin/collect-ferry-data)
            http_code=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | head -n -1)
            echo "Attempt $i/$MAX_RETRIES - HTTP Status: $http_code"
            if [ "$http_code" = "200" ]; then
              echo "Ferry data collection successful"
              echo "$body"
              exit 0
            fi
            echo "Failed (status $http_code). Retrying in ${RETRY_DELAY}s..."
            echo "$body"
            sleep $RETRY_DELAY
          done
          echo "Ferry data collection failed after $MAX_RETRIES attempts"
          exit 1
