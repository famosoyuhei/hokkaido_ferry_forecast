name: Actual Weather Collection

on:
  schedule:
    # Run at 22:00 UTC (07:00 JST) — after ferry scraper (21:00 UTC)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect-actual-weather:
    runs-on: ubuntu-latest
    name: Collect Yesterday Actual Weather

    steps:
      - name: Collect actual weather data (with retry)
        run: |
          echo "Collecting actual weather data for all 4 ports..."
          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" --max-time 300 \
              -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
              "https://web-production-a628.up.railway.app/admin/run-actual-weather")
            http_code=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | head -n -1)
            echo "Attempt $i/$MAX_RETRIES - HTTP Status: $http_code"
            if [ "$http_code" = "200" ]; then
              echo "Actual weather collection successful"
              echo "$body" | python3 -c "import sys,json;d=json.load(sys.stdin);print('  Status:',d.get('status','?'));print('  Records added:',d.get('records_added','?'))" 2>/dev/null || true
              exit 0
            fi
            echo "Failed (status $http_code). Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "Failed after $MAX_RETRIES attempts"
          exit 1
