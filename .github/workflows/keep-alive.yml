name: Keep Alive

# Runs every Monday at 09:00 JST (00:00 UTC) to prevent GitHub from
# disabling scheduled workflows after 60 days of inactivity.

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 09:00 JST

  # Allow manual trigger to recover from "no jobs were run" state
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    name: Keep repository active
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update keep-alive timestamp
        run: |
          NOW=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
          echo "$NOW" > .github/keep-alive.txt
          echo "Keep-alive timestamp updated: $NOW"

      - name: Commit and push
        run: |
          git config user.name  "Ferry Forecast System"
          git config user.email "actions@github.com"
          git add .github/keep-alive.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: keep-alive $( cat .github/keep-alive.txt )"
          git push
          echo "Pushed keep-alive commit"

      - name: Check and restore workflows disabled by inactivity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="famosoyuhei/hokkaido_ferry_forecast"
          WORKFLOWS=(
            "data-collection.yml"
            "ferry-collection.yml"
            "actual-weather-collection.yml"
            "accuracy-tracking.yml"
            "health-check.yml"
          )

          echo "Checking workflow states..."
          NEEDS_ALERT=false
          for wf in "${WORKFLOWS[@]}"; do
            STATE=$(gh api "repos/$REPO/actions/workflows/$wf" --jq '.state' 2>/dev/null || echo "unknown")
            if [ "$STATE" = "disabled_inactivity" ]; then
              # GitHub auto-disabled due to 60-day inactivity → safe to re-enable
              echo "  $wf: disabled_inactivity → re-enabling automatically"
              gh api --method PUT "repos/$REPO/actions/workflows/$wf/enable" \
                && echo "  ✅ Re-enabled" \
                || echo "  ❌ Failed to re-enable"
            elif [ "$STATE" = "disabled_manually" ]; then
              # Manually disabled → do NOT touch; flag for notification
              echo "  $wf: disabled_manually → skipped (intentional?)"
              NEEDS_ALERT=true
            else
              echo "  $wf: $STATE"
            fi
          done

          if [ "$NEEDS_ALERT" = "true" ]; then
            echo ""
            echo "⚠️  One or more workflows are manually disabled."
            echo "If this was unintentional, re-enable them from:"
            echo "https://github.com/$REPO/actions"
          fi
          echo "Done."
