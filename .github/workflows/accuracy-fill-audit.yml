name: Accuracy Fill Audit

on:
  schedule:
    # Run at 22:50 UTC (07:50 JST), after accuracy tracking and Sheets sync.
    - cron: '50 22 * * *'
  workflow_dispatch:

jobs:
  audit-fill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Export accuracy payload from permanent DB
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" --max-time 180 \
            -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
            "https://web-production-a628.up.railway.app/admin/export-accuracy-data?days=90")
          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP $http_code"
          test "$http_code" = "200"
          echo "$body" | python -m json.tool > accuracy-export.json

      - name: Audit DB and Google Sheets fill
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEETS_BEARER_TOKEN: ${{ secrets.GOOGLE_SHEETS_BEARER_TOKEN }}
        run: python accuracy_fill_auditor.py --input accuracy-export.json --output accuracy-fill-audit.json

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-fill-audit
          path: |
            accuracy-export.json
            accuracy-fill-audit.json
