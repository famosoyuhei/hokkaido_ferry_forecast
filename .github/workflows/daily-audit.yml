name: Daily Audit (UI + LINE)

on:
  schedule:
    # 07:10 JST = 22:10 UTC  →  UI監査
    - cron: '10 22 * * *'
  workflow_dispatch:

jobs:
  ui-monitor:
    runs-on: ubuntu-latest
    name: UI Monitor

    steps:
      - name: Run UI monitor
        run: |
          echo "Running UI monitor..."
          MAX_RETRIES=3
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" --max-time 60 \
              -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
              "https://web-production-a628.up.railway.app/admin/run-ui-monitor")
            http_code=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | head -n -1)
            echo "Attempt $i/$MAX_RETRIES - HTTP: $http_code"
            if [ "$http_code" = "200" ]; then
              all_ok=$(echo "$body" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('all_ok','?'))" 2>/dev/null || echo "?")
              echo "UI Monitor all_ok: $all_ok"
              echo "$body" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d.get('stdout','')[-1500:])
" 2>/dev/null || true
              if [ "$all_ok" = "True" ]; then
                echo "✅ UI Monitor passed"
                exit 0
              else
                echo "⚠️  UI Monitor found issues (see stdout above)"
                exit 1
              fi
            fi
            echo "HTTP $http_code — retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "❌ UI Monitor failed to connect after $MAX_RETRIES attempts"
          exit 1

  line-audit:
    runs-on: ubuntu-latest
    name: LINE Integration Audit
    # ui-monitor と独立して並行実行

    steps:
      - name: Run LINE audit
        run: |
          echo "Running LINE integration audit..."
          # 07:25 JST相当になるよう15分待機
          echo "Waiting 15 minutes for LINE morning notification to complete..."
          sleep 900
          MAX_RETRIES=3
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" --max-time 60 \
              -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
              "https://web-production-a628.up.railway.app/admin/run-line-audit")
            http_code=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | head -n -1)
            echo "Attempt $i/$MAX_RETRIES - HTTP: $http_code"
            if [ "$http_code" = "200" ]; then
              all_ok=$(echo "$body" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('all_ok','?'))" 2>/dev/null || echo "?")
              echo "LINE Audit all_ok: $all_ok"
              echo "$body" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d.get('stdout','')[-1500:])
" 2>/dev/null || true
              if [ "$all_ok" = "True" ]; then
                echo "✅ LINE Audit passed"
              else
                echo "⚠️  LINE Audit found issues (see stdout above)"
              fi
              exit 0
            fi
            echo "HTTP $http_code — retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "❌ LINE Audit failed to connect after $MAX_RETRIES attempts"
          exit 1
